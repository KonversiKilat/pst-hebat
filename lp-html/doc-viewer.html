<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Viewer — PST Hebat</title>
  <meta name="description" content="View PDF documents — PST Hebat Document Library">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50:'#eef7ff',100:'#d9edff',200:'#bbdfff',300:'#8ccbff',400:'#55adff',500:'#2e8cff',600:'#0B63CE',700:'#0a4d9e',800:'#0e407a',900:'#113764' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#e2e8f0}
    ::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:#64748b}
    .nav-link{position:relative;transition:color .2s}
    .nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:#0B63CE;transition:width .3s cubic-bezier(0.16,1,0.3,1);border-radius:1px}
    .nav-link:hover::after{width:100%}
    .doc-card{transition:all .2s ease;cursor:pointer}
    .doc-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08);border-color:#0B63CE}
    .active-cat{background:rgba(11,99,206,0.1);color:#0B63CE;border-color:#0B63CE!important}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col bg-slate-50 text-slate-800">

  <!-- Navbar -->
  <header class="sticky top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <a href="index.html" class="flex items-center gap-2.5">
            <svg class="w-8 h-8" viewBox="0 0 58 52" fill="none">
              <path d="M26.7 4.5L3 47.5h18.2L35.5 20.9 26.7 4.5z" fill="#0067B1"/>
              <path d="M39.2 9.6L23.8 47.5h18.7L55 47.2 39.2 9.6z" fill="#003E7E"/>
              <path d="M36.2 30.5l-7.8 17h13.9l10.8-.2-16.9-16.8z" fill="#10A4C4"/>
              <path d="M25.6 30.8H10.9l-9 16.7h18.7l5-16.7z" fill="#0B79BD"/>
            </svg>
            <span class="font-bold text-base text-slate-800">PST<span class="text-brand-600"> Hebat</span></span>
          </a>
          <span class="hidden sm:inline text-xs text-slate-400 ml-2">/ Document Viewer</span>
        </div>
        <nav class="hidden md:flex items-center gap-1">
          <a href="index.html" class="nav-link px-3 py-2 text-sm font-medium text-gray-600 hover:text-brand-600 rounded-lg hover:bg-brand-50/50">Back to Library</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main: PDF Viewer -->
  <div class="flex-1 flex max-w-screen-2xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 gap-6">

    <!-- Left Sidebar: Document List -->
    <aside class="hidden lg:block w-64 shrink-0">
      <div class="sticky top-20 space-y-4">
        <div class="flex items-center justify-between">
          <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">Documents</h3>
          <span id="sidebar-total" class="text-xs text-slate-400">24</span>
        </div>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="sidebar-search" placeholder="Filter documents..." class="w-full bg-slate-100 border border-slate-200 rounded-lg pl-9 pr-3 py-2 text-xs text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500/40 focus:border-brand-500/60 transition">
        </div>
        <div id="sidebar-doclist" class="space-y-1 max-h-[calc(100vh-220px)] overflow-y-auto pr-1">
          <!-- Rendered by JS -->
        </div>
      </div>
    </aside>

    <!-- Main: PDF Viewer -->
    <main class="flex-1 min-w-0">
      <!-- Toolbar -->
      <div class="bg-white border border-slate-200 rounded-t-xl px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3 min-w-0">
          <svg class="w-5 h-5 text-red-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="viewer-title" class="text-sm font-semibold text-slate-700 truncate">Select a document to view</span>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button id="download-btn" class="px-3 py-1.5 rounded-lg bg-brand-600 hover:bg-brand-700 text-white text-xs font-medium transition flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Download
          </button>
          <button id="fullscreen-btn" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 transition">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
          </button>
        </div>
      </div>
      <!-- PDF Embed -->
      <div class="bg-slate-100 border-x border-b border-slate-200 rounded-b-xl overflow-hidden" style="height:calc(100vh - 200px);">
        <embed id="pdf-embed" src="" type="application/pdf" class="w-full h-full">
        <div id="no-selection-viewer" class="flex items-center justify-center h-full text-center">
          <div>
            <svg class="w-16 h-16 text-slate-300 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <h3 class="text-base font-semibold text-slate-400">Select a document</h3>
            <p class="text-sm text-slate-300 mt-1">Choose from the list on the left to view PDF</p>
          </div>
        </div>
      </div>
      <!-- Metadata bar -->
      <div id="doc-metadata" class="hidden bg-white border border-slate-200 rounded-xl p-3 mt-3 flex items-center gap-4 text-xs text-slate-500">
        <span id="meta-author" class="truncate"></span>
        <span class="w-px h-4 bg-slate-200"></span>
        <span id="meta-pages"></span>
        <span class="w-px h-4 bg-slate-200"></span>
        <span id="meta-date"></span>
        <span class="w-px h-4 bg-slate-200"></span>
        <span id="meta-size"></span>
        <span class="w-px h-4 bg-slate-200"></span>
        <span id="meta-category" class="font-medium text-brand-600"></span>
      </div>
    </main>
  </div>

  <script>
    const documents = [
      { id:1, title:'Coal Mining Safety Guidelines 2025', author:'Ministry of Energy & Mineral Resources', pages:48, date:'2025-03-15', size:'2.4 MB', cat:'safety', pdf:'assets/sample.pdf' },
      { id:2, title:'Offshore Drilling Technical Standards', author:'IADC', pages:124, date:'2024-11-20', size:'5.8 MB', cat:'oil-gas', pdf:'assets/sample.pdf' },
      { id:3, title:'Indonesia Mining Law No.3/2020', author:'Government of Indonesia', pages:256, date:'2024-06-10', size:'3.2 MB', cat:'regulations', pdf:'assets/sample.pdf' },
      { id:4, title:'Geological Survey Report: Kalimantan Basin', author:'Badan Geologi', pages:186, date:'2024-09-05', size:'12.1 MB', cat:'mining', pdf:'assets/sample.pdf' },
      { id:5, title:'Oil Refinery Process Safety Management', author:'API', pages:92, date:'2025-01-28', size:'4.6 MB', cat:'safety', pdf:'assets/sample.pdf' },
      { id:6, title:'SNI Geotechnical Investigation', author:'BSN Indonesia', pages:74, date:'2024-04-01', size:'1.8 MB', cat:'standards', pdf:'assets/sample.pdf' },
      { id:7, title:'Production Sharing Contract Guide', author:'SKK Migas', pages:156, date:'2024-07-15', size:'3.9 MB', cat:'oil-gas', pdf:'assets/sample.pdf' },
      { id:8, title:'Mining Reclamation & Closure Plan', author:'Ministry of Energy', pages:68, date:'2024-12-10', size:'2.1 MB', cat:'regulations', pdf:'assets/sample.pdf' },
      { id:9, title:'Seismic Data Processing Handbook', author:'SEG', pages:210, date:'2025-02-01', size:'8.2 MB', cat:'oil-gas', pdf:'assets/sample.pdf' },
      { id:10, title:'Mining Equipment Maintenance', author:'ISO/TC 82', pages:88, date:'2024-08-22', size:'3.4 MB', cat:'standards', pdf:'assets/sample.pdf' },
      { id:11, title:'H2S Safety in Oil & Gas', author:'IOGP', pages:56, date:'2025-01-10', size:'1.6 MB', cat:'safety', pdf:'assets/sample.pdf' },
      { id:12, title:'Coal Bed Methane Exploration', author:'PT. Geo Energi', pages:134, date:'2024-10-05', size:'6.7 MB', cat:'mining', pdf:'assets/sample.pdf' },
      { id:13, title:'Fire Protection Offshore Platforms', author:'NFPA / API', pages:42, date:'2024-05-18', size:'1.2 MB', cat:'safety', pdf:'assets/sample.pdf' },
      { id:14, title:'Mineral Resource Estimation Guide', author:'JORC Committee', pages:98, date:'2024-11-30', size:'4.3 MB', cat:'mining', pdf:'assets/sample.pdf' },
      { id:15, title:'LNG Plant Design Standards', author:'Gas Technology Institute', pages:178, date:'2025-03-01', size:'7.5 MB', cat:'oil-gas', pdf:'assets/sample.pdf' },
      { id:16, title:'EIA for Mining Operations', author:'KLHK RI', pages:312, date:'2024-03-20', size:'9.8 MB', cat:'regulations', pdf:'assets/sample.pdf' },
      { id:17, title:'Drilling Fluid Engineering', author:'Baker Hughes / SPE', pages:244, date:'2024-09-12', size:'11.2 MB', cat:'oil-gas', pdf:'assets/sample.pdf' },
      { id:18, title:'ISO 14001 for Mining', author:'ISO / BSN', pages:36, date:'2024-06-01', size:'0.9 MB', cat:'standards', pdf:'assets/sample.pdf' },
      { id:19, title:'Well Intervention Guidelines', author:'IADC / API', pages:86, date:'2025-02-15', size:'3.1 MB', cat:'oil-gas', pdf:'assets/sample.pdf' },
      { id:20, title:'Mining Explosives Safety', author:'Ministry of Energy', pages:64, date:'2024-12-01', size:'2.8 MB', cat:'safety', pdf:'assets/sample.pdf' },
      { id:21, title:'P&ID Standards', author:'ISO / ANSI / ISA', pages:52, date:'2024-07-08', size:'1.5 MB', cat:'standards', pdf:'assets/sample.pdf' },
      { id:22, title:'Nickel Mining Technology', author:'PT. Vale Indonesia', pages:98, date:'2025-01-20', size:'4.1 MB', cat:'mining', pdf:'assets/sample.pdf' },
      { id:23, title:'Flare & Vent Systems Design', author:'API Standard 521', pages:76, date:'2024-10-30', size:'2.2 MB', cat:'oil-gas', pdf:'assets/sample.pdf' },
      { id:24, title:'Ground Vibration & Airblast', author:'ISEE', pages:44, date:'2024-04-15', size:'1.3 MB', cat:'mining', pdf:'assets/sample.pdf' }
    ];

    let activeDoc = null;
    const sidebarList = document.getElementById('sidebar-doclist');
    const sidebarTotal = document.getElementById('sidebar-total');
    const searchInput = document.getElementById('sidebar-search');
    const pdfEmbed = document.getElementById('pdf-embed');
    const viewerTitle = document.getElementById('viewer-title');
    const noSelection = document.getElementById('no-selection-viewer');
    const docMeta = document.getElementById('doc-metadata');

    function renderSidebar(docs) {
      sidebarTotal.textContent = docs.length;
      sidebarList.innerHTML = docs.map(d => `
        <div class="sidebar-doc flex items-center gap-2.5 px-3 py-2 rounded-lg cursor-pointer text-sm transition ${activeDoc?.id === d.id ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-slate-600 hover:bg-slate-100'}" data-id="${d.id}">
          <svg class="w-4 h-4 text-red-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="truncate">${d.title}</span>
        </div>
      `).join('');

      sidebarList.querySelectorAll('.sidebar-doc').forEach(el => {
        el.addEventListener('click', () => {
          const doc = documents.find(d => d.id === parseInt(el.dataset.id));
          if (doc) openDoc(doc);
        });
      });
    }

    function openDoc(doc) {
      activeDoc = doc;
      noSelection.classList.add('hidden');
      pdfEmbed.classList.remove('hidden');
      pdfEmbed.src = doc.pdf;
      viewerTitle.textContent = doc.title;
      docMeta.classList.remove('hidden');
      document.getElementById('meta-author').textContent = doc.author;
      document.getElementById('meta-pages').textContent = doc.pages + ' pages';
      document.getElementById('meta-date').textContent = new Date(doc.date).toLocaleDateString('en-GB', { year:'numeric', month:'short', day:'numeric' });
      document.getElementById('meta-size').textContent = doc.size;
      document.getElementById('meta-category').textContent = doc.cat === 'oil-gas' ? 'Oil & Gas' : doc.cat.charAt(0).toUpperCase() + doc.cat.slice(1);
      renderSidebar(filterDocs());
    }

    function filterDocs() {
      const q = searchInput.value.toLowerCase();
      const filtered = documents.filter(d => d.title.toLowerCase().includes(q) || d.author.toLowerCase().includes(q));
      if (activeDoc && !filtered.find(d => d.id === activeDoc.id)) {
        activeDoc = null;
        noSelection.classList.remove('hidden');
        pdfEmbed.classList.add('hidden');
        pdfEmbed.src = '';
        viewerTitle.textContent = 'Select a document to view';
        docMeta.classList.add('hidden');
      }
      return filtered;
    }

    searchInput.addEventListener('input', () => {
      renderSidebar(filterDocs());
    });

    document.getElementById('download-btn').addEventListener('click', () => {
      if (activeDoc) window.open(activeDoc.pdf, '_blank');
    });

    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      const el = document.querySelector('.bg-slate-100.border-x');
      if (el.requestFullscreen) el.requestFullscreen();
    });

    // Init
    renderSidebar(documents);
  </script>
</body>
</html>
